<!DOCTYPE html>
<html>
  <head>
    <title>Seats Reservation</title>
    <style>
      .line {
        overflow: hidden;
      }
      .seat {
        margin: 2px;
        float: left;
        width: 30px;
        height: 30px;
        border-radius: 3px;
      }
      .enable {
        background: rgb(92, 92, 245);
      }
      .enable.hover {
        background: black;
      }
      .disable {
        background: red;
      }
      .enable:hover {
        background: black;
      }
    </style>
    <script
      src="https://code.jquery.com/jquery-3.6.3.js"
      integrity="sha256-nQLuAZGRRcILA+6dMBOvcRh5Pe310sBpanc6+QBmyVM="
      crossorigin="anonymous"
    ></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io.connect();

      socket.on("reserve", function (data) {
        let $target = $("div[data-x=" + data.x + "][data-y = " + data.y + "]");
        $target.removeClass("enable");
        $target.addClass("disable");
      });
      socket.on("cancel", function (data) {
        let $target = $("div[data-x=" + data.x + "][data-y = " + data.y + "]");
        $target.removeClass("disable");
        $target.addClass("enable");
      });
    </script>
    <!--make seats-->
    <script>
      function seatReservation() {
        let x = $(this).attr("data-x");
        let y = $(this).attr("data-y");

        if (confirm("좌석을 예약하시겠습니까?")) {
          socket.emit("reserve", {
            x: x,
            y: y,
          });
          alert("successed reservation");
        } else {
          alert("canceled reservation");
        }
      }

      function reservationCancel() {
        let x = $(this).attr("data-x");
        let y = $(this).attr("data-y");

        if (confirm("예약을 취소하시겠습니까?")) {
          socket.emit("cancel", {
            x: x,
            y: y,
          });
          alert("successed cancel");
        } else {
          alert("canceled cancel");
        }
      }
      $(document).ready(function () {
        //execute ajax
        $.getJSON("/seats", { dummy: new Date().getTime() }, function (data) {
          $.each(data, function (indexY, line) {
            let $line = $("<div></div>").addClass("line");
            $.each(line, function (indexX, seat) {
              let $output = $("<div></div>", {
                class: "seat",
                "data-x": indexX,
                "data-y": indexY,
              }).appendTo($line);
              if (seat == 1) {
                $output.addClass("enable").on("click", seatReservation);
              } else if (seat == 2) {
                $output.addClass("disable").on("click", reservationCancel);
              }
            });
            $line.appendTo("body");
          });
        });
      });
    </script>
  </head>
  <body></body>
</html>
